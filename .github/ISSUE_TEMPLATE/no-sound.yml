name: 🔇 I can't hear any sound
description: The game plays no audio on your device
title: "No sound on [device]"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make DoReMingo work everywhere! A few details about your setup let us reproduce the problem.
  - type: input
    id: device
    attributes:
      label: Device
      description: What are you playing on?
      placeholder: e.g. iPhone 15 Pro, Samsung Galaxy S24, MacBook Air
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: e.g. Safari 18, Chrome 137
    validations:
      required: true
  - type: checkboxes
    id: basics
    attributes:
      label: Quick checks
      description: Confirm what you've already ruled out
      options:
        - label: Media volume is up
        - label: The phone's ring/silent switch is NOT on silent (or I'm on a computer)
        - label: Other websites/apps play sound fine on this device
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, starting from opening the game?
      placeholder: |
        1. Opened https://www.codeme.lt/doremingo/
        2. Tapped "Let's go" in the tutorial
        3. Tapped "I heard it!" — but heard nothing at any step
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happens instead
      description: Any error messages, frozen screens, or partial sound?
      placeholder: The screen responds to taps but stays silent the whole time.
