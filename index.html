<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>DoReMingo — learn to hear notes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="app">
    <section id="home-screen" class="screen">
      <h1>DoReMingo</h1>
      <p class="tagline">Hear a note. Feel where it lives. 🦩</p>
      <p id="journey" class="status"></p>
      <div id="level-list" class="level-list"></div>
      <button id="tutorial-btn" class="big-btn secondary">How it works 🎓</button>
      <p id="load-status" class="status" hidden>Warming up the piano…</p>
    </section>

    <section id="meet-screen" class="screen" hidden>
      <h2 id="meet-title"></h2>
      <p id="meet-body" class="tagline"></p>
      <div id="meet-stage" class="degrees"></div>
      <button id="meet-next-btn" class="big-btn">Next</button>
      <button id="meet-skip-btn" class="big-btn secondary">Skip</button>
    </section>

    <section id="quiz-screen" class="screen" hidden>
      <header class="quiz-header">
        <button id="home-btn" class="icon-btn" aria-label="back to level map">🗺️</button>
        <div class="bar-track" aria-label="level progress">
          <div id="bar-fill" class="bar-fill"></div>
        </div>
      </header>
      <p id="level-title" class="status"></p>
      <p id="prompt" class="prompt">Listen…</p>
      <div id="degree-buttons" class="degrees"></div>
      <p id="feedback" class="feedback"></p>
    </section>

    <section id="clear-screen" class="screen" hidden>
      <h1>Level cleared! 🎉</h1>
      <p id="clear-message" class="tagline">Your ear is getting sharper. 🦩</p>
      <button id="next-level-btn" class="big-btn">Next level</button>
      <button id="map-btn" class="big-btn secondary">Level map</button>
    </section>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
